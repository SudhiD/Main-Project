{% extends "base.html" %}
{% block content %}
    <div class="container">
				<div class="row justify-content-center mb-3 pb-3">
          <div class="col-md-12 heading-section text-center ftco-animate">
            <h2 class="mb-4">Our Products</h2>
            <p>Far far away, behind the word mountains, far from the countries Vokalia and Consonantia</p>
          </div>
        </div>   		
    </div>
    <section class="ftco-section ftco-category ftco-no-pt">
			<div class="container">
				<div class="row">
					{% for category in categories %}
					<div class="col-md-4">
						<div class="category-wrap ftco-animate img mb-4 d-flex align-items-end" style="background-image: url({{ category.image.url }});">
							<div class="text px-3 py-1">
								<h2 class="mb-0"><a href="{% url 'shope:products' category.id %}">{{ category.name }}</a></h2>
							</div>		
						</div>
					</div>
					{% endfor %}
				</div>
			</div>
	</section>        
{% endblock %}
